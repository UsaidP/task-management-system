services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ../.env:/app/.env
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: 4000
      MONGODB_URI: ${MONGODB_URI}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      ACCESS_TOKEN_EXPIRY: ${ACCESS_TOKEN_EXPIRY}
      REFRESH_TOKEN_EXPIRY: ${REFRESH_TOKEN_EXPIRY}
      TEMPORARY_TOKEN_EXPIRY: ${TEMPORARY_TOKEN_EXPIRY}
      BLACKLISTED_TOKEN_EXPIRY: ${BLACKLISTED_TOKEN_EXPIRY}
      CORS_ORIGIN: ${CORS_ORIGIN}
      HASH_PEPPER: ${HASH_PEPPER}
      IMAGEKIT_PUBLIC_KEY: ${IMAGEKIT_PUBLIC_KEY}
      IMAGEKIT_PRIVATE_KEY: ${IMAGEKIT_PRIVATE_KEY}
      IMAGEKIT_URL_ENDPOINT: ${IMAGEKIT_URL_ENDPOINT}
      IMAGEKIT_AVATAR_FOLDER: avatars
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USER}
      MAIL_PASSWORD: ${MAIL_PASS}
      MAIL_FROM: ${EMAIL_FROM:-arkammulla@gmail.com}
      EMAIL_FROM: ${EMAIL_FROM:-arkammulla@gmail.com}
      BASE_URL: ${BASE_URL:-http://localhost:4000}
    networks:
      - taskflow-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/v1/healthcheck', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5174}:5174"
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    networks:
      - taskflow-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5174/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  taskflow-network:
    driver: bridge
