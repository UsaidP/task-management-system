<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TaskFlow - Organize work through projects, tasks, subtasks, and sprints. Work that feels human." />
    <meta name="keywords" content="task management, project management, team collaboration, sprint planning, productivity" />
    <meta name="author" content="TaskFlow" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://taskflow.app/" />
    <meta property="og:title" content="TaskFlow - Work that feels human" />
    <meta property="og:description" content="The all-in-one task management platform for modern teams. Projects, sprints, and collaboration in one seamless workspace." />
    <meta property="og:image" content="https://taskflow.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://taskflow.app/" />
    <meta name="twitter:title" content="TaskFlow - Work that feels human" />
    <meta name="twitter:description" content="The all-in-one task management platform for modern teams. Projects, sprints, and collaboration in one seamless workspace." />
    <meta name="twitter:image" content="https://taskflow.app/og-image.png" />

    <!-- Preconnect to font CDNs for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Load fonts with display=swap to prevent render-blocking -->
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap"
        rel="stylesheet"
      />
    </noscript>
    
    <!-- Preload critical resources -->
    <link rel="preload" href="/logo-light.png" as="image" />
    
    <!-- Defer non-critical scripts -->
    <script type="module" src="/src/main.jsx" defer></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
